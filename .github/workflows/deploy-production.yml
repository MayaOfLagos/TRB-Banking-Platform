name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual deployment

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          echo "🚀 Starting deployment..."
          cd ${{ secrets.DEPLOY_PATH }}
          
          # Pull latest changes
          git pull origin master
          
          # Install/Update dependencies
          cd core
          composer install --no-dev --optimize-autoloader
          
          # Run migrations
          php artisan migrate --force
          
          # Clear caches
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear
          
          # Optimize for production
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          # Set permissions
          chmod -R 755 storage bootstrap/cache
          
          # Restart queue workers (if using)
          php artisan queue:restart
          
          echo "✅ Deployment completed successfully!"

    - name: Deployment Status
      run: echo "✅ Application deployed to production server!"

# Note: You need to add these secrets in GitHub repository settings:
# - SERVER_HOST: Your server IP or domain
# - SERVER_USERNAME: SSH username
# - SSH_PRIVATE_KEY: Your SSH private key
# - SERVER_PORT: SSH port (usually 22)
# - DEPLOY_PATH: Path to your application on server
